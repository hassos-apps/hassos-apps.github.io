title: HassOS Apps
lang: en
description: A curated ecosystem of purpose-built Home Assistant apps, crafted with structure, clarity and long-term reliability.
url: "https://hassos-apps.github.io"
baseurl: ""
author:
  name: HassOS Apps
social:
  name: HassOS Apps
  links:
    - https://github.com/hassos-apps

# Repository
github_username: hassos-apps
repository_url: https://github.com/hassos-apps/repository

# Build settings
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - README.md

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
