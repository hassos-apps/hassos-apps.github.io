<header class="fixed top-0 left-0 right-0 z-50 nav-blur border-b" style="border-color: hsl(var(--border));">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 flex h-14 items-center justify-between">
    <a href="{{ '/' | relative_url }}" class="flex items-center gap-2.5 no-underline" aria-label="HassOS Apps home">
      <div class="w-7 h-7 rounded-md flex items-center justify-center text-sm"
           style="background: hsl(var(--primary)); color: hsl(var(--primary-foreground));">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </div>
      <span class="font-semibold text-sm tracking-tight" style="color: hsl(var(--foreground));">HassOS Apps</span>
    </a>

    <nav class="hidden md:flex items-center gap-1" aria-label="Primary">
      <a href="#principles" class="btn btn-ghost nav-link" data-nav-link style="font-size:0.8125rem; padding:0.375rem 0.75rem;">Principles</a>
      <a href="#apps" class="btn btn-ghost nav-link" data-nav-link style="font-size:0.8125rem; padding:0.375rem 0.75rem;">Apps</a>
      <a href="#install" class="btn btn-ghost nav-link" data-nav-link style="font-size:0.8125rem; padding:0.375rem 0.75rem;">Installation</a>
      <a href="#developers" class="btn btn-ghost nav-link" data-nav-link style="font-size:0.8125rem; padding:0.375rem 0.75rem;">Developers</a>
    </nav>

    <div class="flex items-center gap-2">
      <a href="https://github.com/hassos-apps" target="_blank" rel="noopener noreferrer"
         class="btn btn-ghost" style="padding:0.375rem 0.5rem;" aria-label="HassOS Apps on GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"/>
        </svg>
      </a>
      <button id="theme-toggle" class="btn btn-ghost" type="button" style="padding:0.375rem 0.5rem;"
              aria-label="Toggle theme" aria-pressed="true">
        <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
      </button>
    </div>
  </div>
</header>
