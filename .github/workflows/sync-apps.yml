name: Sync Apps from Repository

on:
  # Run automatically every 6 hours
  schedule:
    - cron: "0 */6 * * *"

  # Also trigger whenever a push happens in the addons repository
  # (requires setting up a repo_dispatch webhook in hassos-apps/repository)
  repository_dispatch:
    types: [addon-updated]

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write   # needed to commit the updated _data/apps.yml

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip pyyaml

      - name: Fetch app metadata and update _data/apps.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/sync-apps.py

      - name: Run project quality checks
        run: python scripts/check-site.py

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/apps.yml
          if git diff --staged --quiet; then
            echo "No changes to _data/apps.yml — nothing to commit."
          else
            git commit -m "chore(data): sync apps from hassos-apps/repository [skip ci]"
            git push
          fi
